definitions:
  response.ErrorResponse:
    description: Error response
    properties:
      code:
        example: ERROR_CODE
        type: string
      message:
        example: error message
        type: string
      success:
        example: false
        type: boolean
    type: object
  response.SuccessResponse:
    description: Success response with data
    properties:
      data: {}
      success:
        example: true
        type: boolean
    type: object
info:
  contact: {}
