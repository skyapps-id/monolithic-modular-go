services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: server
    ports:
      - "8080:8080"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./app.db:/app/app.db
    env_file:
      - .env
    restart: unless-stopped

  inventory:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: inventory
    ports:
      - "8081:8081"
    volumes:
      - ./config.inventory.yml:/app/config.inventory.yml:ro
    env_file:
      - .env
    restart: unless-stopped
